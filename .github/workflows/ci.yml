name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: cd dashboard && npm ci

      - name: Repository check script
        run: bash scripts/check.sh 2>&1 | tee check_output.log

      - name: Publish failure log to run summary
        if: failure()
        run: |
          {
            echo '## check.sh failure tail'
            echo '```'
            tail -c 60000 check_output.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Doc tests
        run: cargo test --workspace --doc

      - name: Build release
        run: cargo build --workspace --release

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Install cargo-deny
        run: cargo install cargo-deny
      - name: Dependency vulnerability audit
        run: cargo audit
      - name: Cargo deny check (advisories + bans + licenses)
        run: cargo deny check advisories bans licenses
      - name: Cache deny check
        run: cargo deny check sources

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz | \
            tar -xz gitleaks
          chmod +x gitleaks
      - name: Secret scan
        run: ./gitleaks detect --source=. --no-git --verbose

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info 2>&1 | tee coverage_output.log

      - name: Publish failure log to run summary
        if: failure()
        run: |
          {
            echo '## coverage failure tail'
            echo '```'
            tail -c 60000 coverage_output.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  python-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: pip install ruff && ruff check src/ tests/
      - name: Test
        run: python -m pytest tests/ -v

  typescript-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: crates/sdk/typescript/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
