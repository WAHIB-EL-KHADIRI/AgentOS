name: Release

on:
  push:
    tags: ["v*.*.*"]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross_cc: aarch64-linux-gnu-gcc
            cross_apt_package: gcc-aarch64-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      # Only the arm64-on-x86_64 cross target needs this: rustls's crypto
      # backend (ring) compiles small C/asm shims for the target arch, which
      # needs a real cross C toolchain even though there's no system OpenSSL
      # dependency anymore. Every other target in this matrix builds natively.
      - name: Install cross C toolchain
        if: matrix.cross_apt_package
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.cross_apt_package }}

      - name: Build release
        env:
          CC_aarch64_unknown_linux_gnu: ${{ matrix.cross_cc }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross_cc }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/agentOS dist/
          cp README.md LICENSE-MIT LICENSE-APACHE dist/
          cd dist && tar czf "../agentOS-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item -Path "target/${{ matrix.target }}/release/agentOS.exe" -Destination dist/
          Copy-Item -Path README.md,LICENSE-MIT,LICENSE-APACHE -Destination dist/
          Compress-Archive -Path dist/* -DestinationPath "agentOS-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: agentOS-${{ matrix.target }}
          path: agentOS-${{ github.ref_name }}-${{ matrix.target }}.*

  publish-github-release:
    name: Publish GitHub Release
    needs: [build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: agentOS-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum agentOS-* > checksums.txt
          else
            shasum -a 256 agentOS-* > checksums.txt
          fi

      - name: Check release notes
        run: test -f "docs/releases/${{ github.ref_name }}.md"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agentOS-*
            checksums.txt
          body_path: docs/releases/${{ github.ref_name }}.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: false

  publish-docker:
    name: Publish Docker Images
    needs: [build-binaries]
    if: ${{ !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-rc') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Supervisor image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: supervisor
          push: true
          tags: ${{ steps.meta.outputs.tags }}-supervisor
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}-runtime
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: true
          tags: ${{ steps.meta.outputs.tags }}-dashboard
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
