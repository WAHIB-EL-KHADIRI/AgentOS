# cargo-deny configuration (version 2 schema).
# https://embarkstudios.github.io/cargo-deny/checks/index.html

[advisories]
version = 2
# version 2 defaults: vulnerability/unsound/yanked are errors.
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal path dependencies carry no version; only registry wildcards matter.
allow-wildcard-paths = true
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []

[licenses]
version = 2
# version 2 defaults: anything not explicitly allowed is an error.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8
exceptions = []
